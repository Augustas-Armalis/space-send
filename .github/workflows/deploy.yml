name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build static site
        env:
          GITHUB_PAGES: "true"
          # Project pages are served at <user>.github.io/<repo>/ — basePath must be /<repo>.
          # If your repo is named <user>.github.io, set both of these to "" instead.
          PAGES_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
          # Optional: deploy the signaling Worker and add this repo secret to
          # unlock cross-device Beams. Without it, Beam works same-machine only.
          NEXT_PUBLIC_SIGNAL_URL: ${{ secrets.NEXT_PUBLIC_SIGNAL_URL }}
        run: |
          npm run build
          touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
