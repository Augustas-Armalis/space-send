name = "space-send-signaling"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Durable Objects:
#   BEAM_ROOMS — one WebRTC signaling room per Beam id.
#   USAGE      — bucket-wide byte counter that enforces the 9 GB hard cap so
#                we stay inside Cloudflare R2's 10 GB free tier.
[[durable_objects.bindings]]
name = "BEAM_ROOMS"
class_name = "BeamRoom"

[[durable_objects.bindings]]
name = "USAGE"
class_name = "UsageCounter"

# Free Workers plan requires Durable Objects to be SQLite-backed, so both
# classes are introduced with new_sqlite_classes. (The KV storage API used in
# the code works identically on SQLite-backed DOs.)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["BeamRoom", "UsageCounter"]

# R2 bucket holds Drop manifests + file bytes for cross-device delivery.
# Create the bucket first:   wrangler r2 bucket create space-send-drops
[[r2_buckets]]
binding = "DROPS"
bucket_name = "space-send-drops"

# Deploy: cd packages/signaling-worker && npm i && npx wrangler r2 bucket create space-send-drops && npx wrangler deploy
# Then in the web app set: NEXT_PUBLIC_SIGNAL_URL = wss://space-send-signaling.<account>.workers.dev
